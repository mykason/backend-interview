<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAISON</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
            width: 100%;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #333;
            margin: 0 auto 30px;
            overflow: hidden;
            transition: border-color 0.3s ease, transform 0.3s ease;
        }

        .avatar:hover {
            border-color: #58a6ff;
            transform: scale(1.05);
        }

        .avatar svg {
            width: 100%;
            height: 100%;
            fill: #333;
            background: #161b22;
        }

        .name {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 6px;
            margin-bottom: 12px;
            color: #f0f0f0;
        }

        .bio {
            font-size: 1rem;
            color: #8b949e;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .links a {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b949e;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .links a:hover {
            border-color: #58a6ff;
            color: #58a6ff;
            transform: translateY(-3px);
        }

        .links a svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: #21262d;
            margin: 0 auto 40px;
        }

        .section-title {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .projects {
            display: grid;
            gap: 16px;
        }

        .project-card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 20px;
            text-align: left;
            transition: border-color 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-card:hover {
            border-color: #30363d;
        }

        .project-card h3 {
            font-size: 0.95rem;
            margin-bottom: 6px;
            color: #58a6ff;
            font-weight: 500;
        }

        .project-card p {
            font-size: 0.82rem;
            color: #8b949e;
            line-height: 1.5;
        }

        .project-meta {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 0.75rem;
            color: #6e7681;
        }

        .project-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .project-meta .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            font-size: 0.75rem;
            color: #484f58;
        }

        @media (max-width: 480px) {
            .name {
                font-size: 1.8rem;
                letter-spacing: 4px;
            }
        }
    </style>
</head>

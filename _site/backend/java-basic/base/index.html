        <h1 id="1谈谈你对泛型的理解和泛型的原理">1.谈谈你对泛型的理解和泛型的原理</h1>
<ul>
  <li><strong>定义</strong>:泛型就是参数化类型，把类型当作参数，在编译时指定，让类 / 方法 / 接口可以适配多种数据类型</li>
  <li><strong>作用</strong>:
– 编译期类型检查：把类型错误提前到编译期，而不是运行时报错
– 避免强制类型转换，代码更简洁、安全
– 提高代码复用：一个容器可以存多种类型，不用重复写 IntList、StringList</li>
</ul>
